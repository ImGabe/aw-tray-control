name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

      - name: Lint shell scripts
        run: |
          shellcheck --version
          shellcheck scripts/*.sh

  extra-checks:
    name: check, docs, security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Type-check and compile
        run: cargo check --workspace --all-targets --all-features

      - name: Build docs (no deps)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: Restore security tools from cache
        uses: Swatinem/rust-cache@v2
        with:
          key: security-tools-v1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --force-if-installed

      - name: Security audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --force-if-installed

      - name: Dependency and source policy checks
        run: cargo deny check advisories bans sources
